name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        working-directory: backend
        run: dotnet restore
      - name: Build
        working-directory: backend
        run: dotnet build --no-restore -c Release
      - name: Vulnerability scan (NuGet)
        working-directory: backend
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.log
          if grep -q "has the following vulnerable packages" vuln.log; then
            echo "::error::Vulnerable NuGet packages detected"
            exit 1
          fi
      - name: Test
        working-directory: backend
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=tests.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-tests
          path: backend/**/TestResults/*.trx

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run build
      - run: npm test
