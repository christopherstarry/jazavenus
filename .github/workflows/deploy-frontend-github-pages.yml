# GitHub Actions → Pages. One-time: Settings → Pages → Source = "GitHub Actions".
#
# If site 404 but repo public: open Actions tab — build + deploy must both succeed.

name: deploy-frontend-github-pages

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require monorepo layout (frontend/ folder)
        run: |
          if ! test -f frontend/package.json; then
            echo "::error title=Wrong repo layout::This workflow expects frontend/package.json at repo root." \
              "Ensure you pushed the full project including the frontend/ folder, not only backend files."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set Vite base (/repo/ for project sites)
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_RAW="${{ github.event.repository.name }}"
          REPO_LOWER=$(echo "$REPO_RAW" | tr '[:upper:]' '[:lower:]')
          if [ "$REPO_LOWER" = "${OWNER_LOWER}.github.io" ]; then
            echo "VITE_PAGES_BASE=/" >> "$GITHUB_ENV"
          else
            echo "VITE_PAGES_BASE=/${REPO_LOWER}/" >> "$GITHUB_ENV"
          fi
          echo "VITE_SKIP_ANTIFORGERY=true" >> "$GITHUB_ENV"
          echo "---"
          echo "After deploy, open: https://${OWNER_LOWER}.github.io/${REPO_LOWER}/"
          echo "---"

      - name: Install & build
        working-directory: frontend
        run: npm ci && npm run build

      - run: ls -la frontend/dist/

      - name: SPA 404 fallback
        run: cp frontend/dist/index.html frontend/dist/404.html

      # Must run in this job shortly before upload (same job as artifact).
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
