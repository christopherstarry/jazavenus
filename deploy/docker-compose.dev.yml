name: jaza-dev
services:
  postgres:
    image: postgres:17-alpine
    container_name: jaza-postgres-dev
    environment:
      POSTGRES_DB: jaza_venus_dev
      POSTGRES_USER: jaza_app
      POSTGRES_PASSWORD: "ChangeMe!Dev2027"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - jaza-pgdata-dev:/var/lib/postgresql/data
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    container_name: jaza-seq-dev
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "127.0.0.1:5341:80"
    volumes:
      - jaza-seq-dev:/data
    restart: unless-stopped

volumes:
  jaza-pgdata-dev:
  jaza-seq-dev:
