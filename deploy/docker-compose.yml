name: jaza
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: jaza-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_SA_PASSWORD:?env SQL_SA_PASSWORD is required}
      MSSQL_PID: "Express"
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
      - ./backups:/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

  api:
    image: jaza/api:${IMAGE_TAG:-latest}
    build:
      context: ../backend
      dockerfile: ../deploy/api.Dockerfile
    container_name: jaza-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Server=sqlserver,1433;Database=JazaVenus;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=True
      Cookie__SecurePolicy: Always
      Cors__AllowedOrigins__0: https://${DOMAIN:?env DOMAIN is required}
      Seed__SuperAdminEmail: ${SEED_SUPERADMIN_EMAIL:-superadmin@jaza.local}
      Seed__SuperAdminPassword: ${SEED_SUPERADMIN_PASSWORD:-}
    expose:
      - "8080"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: jaza-caddy
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
    restart: unless-stopped

volumes:
  sqldata:
  caddy-data:
  caddy-config:
