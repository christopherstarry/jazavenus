name: jaza
services:
  postgres:
    image: postgres:17-alpine
    container_name: jaza-postgres
    environment:
      POSTGRES_DB: jaza_venus
      POSTGRES_USER: jaza_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:?env DB_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jaza_app -d jaza_venus"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: jaza/api:${IMAGE_TAG:-latest}
    build:
      context: ../backend
      dockerfile: ../deploy/api.Dockerfile
    container_name: jaza-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=jaza_venus;Username=jaza_app;Password=${DB_PASSWORD}
      Cookie__SecurePolicy: Always
      Cors__AllowedOrigins__0: https://${DOMAIN:?env DOMAIN is required}
      Seed__SuperAdminEmail: ${SEED_SUPERADMIN_EMAIL:-superadmin@jaza.local}
      Seed__SuperAdminPassword: ${SEED_SUPERADMIN_PASSWORD:-}
    expose:
      - "8080"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: jaza-caddy
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
    restart: unless-stopped

volumes:
  pgdata:
  caddy-data:
  caddy-config:
