# Fly.io app manifest for the Jaza Venus API.
#
# Usage (one-time):
#   1. Install flyctl:                                  https://fly.io/docs/hands-on/install-flyctl/
#   2. Sign in:                                         flyctl auth login
#   3. Create the app:                                  flyctl apps create jaza-venus
#   4. Set secrets (Neon connection string, JWT key, seed creds, etc.):
#        flyctl secrets set --app jaza-venus \
#          ConnectionStrings__Default="Host=ep-...neon.tech;Port=5432;Database=neondb;Username=...;Password=...;SSL Mode=Require;Trust Server Certificate=true;Channel Binding=Disable" \
#          Auth__Jwt__SigningKey="$(openssl rand -base64 64)" \
#          Auth__Jwt__Issuer="jaza-venus" \
#          Auth__Jwt__Audience="jaza-venus-app" \
#          Auth__Jwt__AccessTokenMinutes="15" \
#          Auth__Jwt__RefreshTokenHours="24" \
#          Seed__SuperAdminEmail="owner@jaza.local" \
#          Seed__SuperAdminPassword=""   # leave blank to have the API generate + log it on first boot
#   5. Deploy:                                          flyctl deploy --app jaza-venus --config deploy/fly.toml --dockerfile deploy/api.Dockerfile
#
# All HTTP traffic (port 80/443) terminates at Fly's proxy. The API listens on 8080 inside
# the container, matching deploy/api.Dockerfile. Forwarded headers are honoured in Program.cs
# so the cookie's Secure flag continues to work.

app = "jaza-venus"
primary_region = "sin"     # Singapore — matches Neon's ap-southeast-1 region.
kill_signal = "SIGINT"
kill_timeout = "15s"

[build]
  dockerfile = "deploy/api.Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:8080"
  Cookie__SecurePolicy = "Always"
  Cors__AllowedOrigins__0 = "https://jaza-venus.fly.dev"
  Auth__RequireSuperAdminMfa = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

# Fly.io's free tier — bump as load grows.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
